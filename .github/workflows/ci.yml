name: CI

on:
  push:
    branches: [ main, 6.x ]
  pull_request:

permissions:
  contents: read

jobs:
  analysis:
    name: PHP ${{ matrix.php }} / Craft ${{ matrix.craft }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Craft 6 requires PHP 8.5+. The adapter (craftcms/yii2-adapter) is a
        # dev-stability package during the Craft 6 beta period; minimum-stability
        # is already set to "dev" in composer.json so this resolves cleanly.
        include:
          - { php: '8.5', craft: '^6.0' }
    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, dom, mbstring, pdo, pdo_mysql, gd, bcmath, json
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies (Craft ${{ matrix.craft }})
        run: composer require "craftcms/cms:${{ matrix.craft }}" --no-interaction --no-progress --update-with-all-dependencies

      - name: Security audit
        run: composer audit --no-interaction

      # PHPStan and Rector are non-blocking on the Craft 6 line for now:
      # craftcms/phpstan and craftcms/rector (dev-main) are not yet Craft 6
      # compatible — their bundled config references vendor/craftcms/cms/src/Craft.php,
      # which the Craft 6 Laravel rewrite relocated (namespace is now CraftCms\Cms\).
      # Re-enable as hard gates (drop continue-on-error) once those tools support
      # Craft 6. Tracked alongside adding SetList::CRAFT_CMS_60 in rector.php.
      - name: PHPStan
        run: composer phpstan
        continue-on-error: true

      - name: Rector (dry-run)
        run: composer rector
        continue-on-error: true
